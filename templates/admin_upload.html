{% extends "base.html" %}

{% block title %}Admin - Szelvény Feltöltés{% endblock %}

{% block content %}
<div class="container" style="max-width: 700px; margin: 20px auto; padding: 20px; background: #2d3748; border-radius: 12px; color: white;">
    <h2 style="border-bottom: 2px solid #4a5568; padding-bottom: 10px;">📝 Manuális Szelvény Feltöltése</h2>
    
    <p style="font-size: 0.9em; color: #a0aec0;">Itt tudsz olyan szelvényt feltölteni, amiről van screenshotod.</p>

    <form action="/admin/upload" method="post" enctype="multipart/form-data" style="margin-top: 20px;">
        <div style="margin-bottom: 15px;">
            <label>Szelvény Típusa:</label>
            <select name="tip_type" style="width: 100%; padding: 12px; background: #1a202c; border: 1px solid #4a5568; color: white; border-radius: 6px;">
                <option value="vip">VIP (Szerkesztői)</option>
                <option value="free">Ingyenes Tipp</option>
            </select>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Szelvény Neve:</label>
            <input type="text" name="tipp_neve" placeholder="Pl: Esti Hoki Mix" required style="width: 100%; padding: 12px; background: #1a202c; border: 1px solid #4a5568; color: white; border-radius: 6px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label>Eredő Odds:</label>
            <input type="number" step="0.01" name="eredo_odds" placeholder="Pl: 3.45" required style="width: 100%; padding: 12px; background: #1a202c; border: 1px solid #4a5568; color: white; border-radius: 6px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label>Melyik napra szól?</label>
            <input type="date" name="target_date" required style="width: 100%; padding: 12px; background: #1a202c; border: 1px solid #4a5568; color: white; border-radius: 6px;">
        </div>

        <div style="margin-bottom: 20px; padding: 15px; background: #3e4a5e; border-radius: 6px; border: 1px dashed #718096;">
            <label style="display: block; margin-bottom: 10px; font-weight: bold;">📸 Szelvény Képe (Screenshot):</label>
            <input type="file" name="slip_image" accept="image/*" required style="color: white;">
        </div>

        <button type="submit" style="width: 100%; padding: 15px; background: #38a169; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 1.1rem; cursor: pointer;">
            🚀 Szelvény Feltöltése és Értesítés
        </button>
    </form>
</div>
{% endblock %}
